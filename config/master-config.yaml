  - column_id: run_total_seconds
    header: Run Total (seconds)
    type: integer
    source:
      kind: metric
      metric_ids: [m_run_time_seconds]
    transform:
      op: identity
    null_rule:
      on_all_inputs_null: blank
    output:
      excel_number_format: "0"
      alignment: center
      style_tags: [seconds]

  - column_id: swim_total_seconds
    header: Swim Total (seconds)
    type: integer
