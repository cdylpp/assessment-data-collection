  - column_id: ibs_low_carry_physicality_total
    header: IBS Low Carry - Physicality Total
    type: numeric
    source:
      kind: metric
      metric_ids: [m_ibs_low_carry_physicality]
    transform:
      op: aggregate_occurrences
