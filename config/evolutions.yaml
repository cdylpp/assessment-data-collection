version: 2.0
registry_name: soac_fy_2026_v1

# Build contract for every evolution sheet.
sheet_defaults:
  roster_columns:
    - field: first
      header: First
      source_field: first
      locked: true
    - field: last
      header: Last
      source_field: last
      locked: true
    - field: uid
      header: UID
      source_field: uid
      locked: true
  freeze_panes: D3
  header_row: 1
  metric_id_row: 2
  first_candidate_row: 3
  metadata_fields:
    - block_number
    - fiscal_year

# V2.0 evolutions from the second config document, canonicalized.
# Improvement: if repeated metric lists remain stable, add aliases to avoid duplication.
# metric_occurrences specifies how many times a metric appears in an evolution.
evolutions:
  - evolution_id: evo_pst
    display_name: "PST"
    sheet_name: "PST"
    metric_ids:
      - m_push_ups
      - m_sit_ups
      - m_pull_ups
      - m_run_time_seconds
      - m_swim_time_seconds

  - evolution_id: evo_5_mile_run
    display_name: "5 Mile Timed Run"
    sheet_name: "5 Mile Run"
    metric_ids:
      - m_5mile_run_time_seconds

  - evolution_id: evo_grit_pt
    display_name: "Grit PT"
    sheet_name: "Grit PT"
    metric_occurrences:
      m_grit_pt_physicality: 6
      m_grit_pt_teamability: 6
      m_grit_pt_communication: 6
    metric_ids:
      - m_grit_pt_physicality
      - m_grit_pt_teamability
      - m_grit_pt_communication

  - evolution_id: evo_face_mask_apprec
